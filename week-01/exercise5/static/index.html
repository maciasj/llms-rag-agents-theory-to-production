<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy-ChatGPT</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div id="app">
    <div id="chat-panel">
      <div id="header">
        Easy-ChatGPT
        <label id="stream-label">
          <input type="checkbox" id="stream-toggle" checked> Stream
        </label>
      </div>
      <div id="messages"></div>
      <div id="input-area">
        <div id="input-wrapper">
          <div id="image-preview"></div>
          <div id="input-row">
            <button id="image-btn" type="button" title="Attach image">📷</button>
            <input id="input" type="text" placeholder="Type a message..." autofocus>
            <button id="send">Send</button>
          </div>
        </div>
        <input id="image-input" type="file" accept="image/*" hidden>
      </div>
    </div>
    <div id="context-panel">
      <h2>Context View</h2>
      <div id="token-usage">
        <h3>Token Usage</h3>
        <div id="tokens">No data yet</div>
      </div>
      <div id="messages-sent">
        <h3>Messages Sent</h3>
        <pre id="messages-json">[]</pre>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
